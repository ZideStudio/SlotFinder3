name: Main Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: main-pipeline-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: slotfinder
  PRD_DOMAIN: slotfinder.fr

jobs:
  back-ci:
    name: Back CI
    uses: ./.github/workflows/back-build.yaml
    with:
      base_ref: ${{ github.event.before }}
    secrets: inherit

  front-ci:
    name: Front CI
    uses: ./.github/workflows/front-build.yaml
    with:
      base_ref: ${{ github.event.before }}
    secrets: inherit

  docker-ci:
    name: Docker CI
    uses: ./.github/workflows/docker-build.yml
    with:
      base_ref: ${{ github.event.before }}
    secrets: inherit

  build-production:
    name: Build Production Images
    needs: [back-ci, front-ci, docker-ci]
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Create JWT keys for production
        run: |
          mkdir -p back/config/jwt
          echo "${{ secrets.JWT_PRIVATE_KEY_PRD }}" > back/config/jwt/private.pem
          echo "${{ secrets.JWT_PUBLIC_KEY_PRD }}" > back/config/jwt/public.pem
          chmod 644 back/config/jwt/private.pem
          chmod 644 back/config/jwt/public.pem

      - name: Create .env for frontend production
        run: echo "${{ secrets.FRONT_ENV_PRD }}" > .env

      - name: Build Production Images
        run: docker compose -f docker-compose-build-prd.yml build
        env:
          IMAGE_TAG: ${{ github.sha }}

  deploy-production:
    name: Deploy to Production
    needs: build-production
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for backend production
        run: echo "${{ secrets.BACK_ENV_PRD }}" > .env

      - name: Deploy Production Services
        run: |
          export DOMAIN=${PRD_DOMAIN}
          export FRONT_IMAGE=prd-${IMAGE_NAME}-front:${{ github.sha }}
          export BACK_IMAGE=prd-${IMAGE_NAME}-back:${{ github.sha }}
          docker compose -f docker-compose-prd.yml up -d
        env:
          COMPOSE_PROJECT_NAME: slotfinder-prd

  release:
    name: Create Release
    needs: deploy-production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          LAST_TAG=$(git tag --list 'v[0-9]*.[0-9]*' --sort=-version:refname | head -1)

          if [ -z "$LAST_TAG" ]; then
            NEW_TAG="v1.0"
            RANGE="HEAD"
          else
            X=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f1)
            Y=$(echo "$LAST_TAG" | cut -d. -f2)
            RANGE="${LAST_TAG}..HEAD"

            if git log "${LAST_TAG}..HEAD" --pretty=format:"%s" | grep -q "^feat"; then
              NEW_TAG="v$((X + 1)).0"
            else
              NEW_TAG="v${X}.$((Y + 1))"
            fi
          fi

          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "range=${RANGE}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        run: |
          RANGE="${{ steps.version.outputs.range }}"
          COMMITS=$(git log "${RANGE}" --pretty=format:"%s" --no-merges)

          FEAT=$(echo "$COMMITS" | grep "^feat" | sed 's/^/- /' || true)
          FIX=$(echo "$COMMITS" | grep "^fix" | sed 's/^/- /' || true)
          PERF=$(echo "$COMMITS" | grep "^perf" | sed 's/^/- /' || true)
          REFACTOR=$(echo "$COMMITS" | grep "^refactor" | sed 's/^/- /' || true)
          OTHER=$(echo "$COMMITS" | grep -v "^feat\|^fix\|^perf\|^refactor" | sed 's/^/- /' || true)

          BODY=""
          [ -n "$FEAT" ]     && BODY="${BODY}## Features\n${FEAT}\n\n"
          [ -n "$FIX" ]      && BODY="${BODY}## Bug Fixes\n${FIX}\n\n"
          [ -n "$PERF" ]     && BODY="${BODY}## Performance\n${PERF}\n\n"
          [ -n "$REFACTOR" ] && BODY="${BODY}## Refactoring\n${REFACTOR}\n\n"
          [ -n "$OTHER" ]    && BODY="${BODY}## Other Changes\n${OTHER}\n\n"

          printf "%b" "$BODY" > /tmp/changelog.md

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          gh release create "$NEW_TAG" \
            --title "$NEW_TAG" \
            --notes-file /tmp/changelog.md
