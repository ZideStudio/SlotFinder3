name: Front Build

on:
  push:
    branches:
      - main
      - "renovate/**"
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
  merge_group:
    branches: ["main"]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: front-build-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'merge_group' }}

env:
  FRONT_FOLDER: ./front

jobs:
  detect-changes:
    name: Detect Front Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      front: ${{ steps.filter.outputs.front }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Check for front file changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            front:
              - "front/**"
              - ".mise.toml"
              - ".github/workflows/front-build.yaml"
              - ".github/actions/setup-node/**"
              - "Makefile"

  install:
    name: Front Install package
    needs: detect-changes
    if: needs.detect-changes.outputs.front == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Check package-lock.json
        working-directory: ${{ env.FRONT_FOLDER }}
        run: npm run package:check

      - name: Install package
        working-directory: ${{ env.FRONT_FOLDER }}
        run: npm ci

  lint:
    name: Front Lint code
    needs: [detect-changes, install]
    if: needs.detect-changes.outputs.front == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Run lint
        working-directory: ${{ env.FRONT_FOLDER }}
        run: npm run lint

  test:
    name: Front Test
    needs: [detect-changes, install]
    if: needs.detect-changes.outputs.front == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Run Playwright install
        working-directory: ${{ env.FRONT_FOLDER }}
        run: npx playwright install

      - name: Run test
        working-directory: ${{ env.FRONT_FOLDER }}
        run: npm run test

  build:
    name: Front Build
    needs: [detect-changes, install]
    if: needs.detect-changes.outputs.front == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Run build
        working-directory: ${{ env.FRONT_FOLDER }}
        run: npm run build

  storybook-build:
    name: Front Build Storybook
    needs: [detect-changes, install]
    if: needs.detect-changes.outputs.front == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Run build
        working-directory: ${{ env.FRONT_FOLDER }}
        run: npm run build:storybook

  chromatic:
    name: Run Chromatic
    needs: [detect-changes, install]
    if: needs.detect-changes.outputs.front == 'true' && ((github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main') || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Filter changed paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: changes
        with:
          filters: |
            ui:
              - 'front/src/ui/**'
      - name: Setup Node
        if: steps.changes.outputs.ui == 'true'
        uses: ./.github/actions/setup-node
      - name: Run Chromatic
        if: steps.changes.outputs.ui == 'true'
        uses: chromaui/action@c49581ed7e45543eef2b5d727cf97a688a83e7d8 # v17
        with:
          buildScriptName: "build:storybook"
          workingDir: "front"
          onlyChanged: false
          zip: true
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          autoAcceptChanges: "main"
