name: Back Build

on:
  push:
    branches:
      - "renovate/**"
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
  merge_group:
    branches: ["main"]
  workflow_call:
    inputs:
      base_ref:
        description: 'Base SHA for change detection (used when called via workflow_call)'
        type: string
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: back-build-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'merge_group' }}

env:
  BACK_FOLDER: ./back

jobs:
  detect-changes:
    name: Detect Back Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      back: ${{ steps.filter.outputs.back }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Check for back file changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          base: ${{ inputs.base_ref }}
          filters: |
            back:
              - 'back/**'
              - '.mise.toml'
              - '.github/workflows/back-build.yaml'
              - '.github/actions/setup-go/**'
              - 'Makefile'

  install:
    name: Back Install dependencies
    needs: detect-changes
    if: needs.detect-changes.outputs.back == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Install dependencies
        working-directory: ${{ env.BACK_FOLDER }}
        run: go mod download

  lint:
    name: Back Lint code
    needs: [detect-changes, install]
    if: needs.detect-changes.outputs.back == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Run vet
        working-directory: ${{ env.BACK_FOLDER }}
        run: go vet ./...

  test:
    name: Back Test
    needs: [detect-changes, install]
    if: needs.detect-changes.outputs.back == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Run tests
        working-directory: ${{ env.BACK_FOLDER }}
        run: go test -v ./... -race -coverprofile=coverage.txt -covermode=atomic

      - name: Upload coverage reports
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          file: ${{ env.BACK_FOLDER }}/coverage.txt
          flags: backend

  build:
    name: Back Build
    needs: [detect-changes, install]
    if: needs.detect-changes.outputs.back == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Build
        working-directory: ${{ env.BACK_FOLDER }}
        run: go build -v ./...

  swaggo:
    name: Back Check Swagger documentation build
    needs: [detect-changes, install]
    if: needs.detect-changes.outputs.back == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Generate Swagger documentation
        working-directory: ${{ env.BACK_FOLDER }}
        run: |
          go tool swag init
          sed -i '/LeftDelim/d; /RightDelim/d' docs/docs.go
