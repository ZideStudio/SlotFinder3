name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          LAST_TAG=$(git tag --list 'v[0-9]*.[0-9]*' --sort=-version:refname | head -1)

          if [ -z "$LAST_TAG" ]; then
            NEW_TAG="v1.0"
            RANGE="HEAD"
          else
            X=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f1)
            Y=$(echo "$LAST_TAG" | cut -d. -f2)
            RANGE="${LAST_TAG}..HEAD"

            if git log "${LAST_TAG}..HEAD" --pretty=format:"%s" | grep -q "^feat"; then
              NEW_TAG="v$((X + 1)).0"
            else
              NEW_TAG="v${X}.$((Y + 1))"
            fi
          fi

          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "last_tag=${LAST_TAG}" >> "$GITHUB_OUTPUT"
          echo "range=${RANGE}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          RANGE="${{ steps.version.outputs.range }}"
          COMMITS=$(git log "${RANGE}" --pretty=format:"%s" --no-merges)

          FEAT=$(echo "$COMMITS" | grep "^feat" | sed 's/^/- /' || true)
          FIX=$(echo "$COMMITS" | grep "^fix" | sed 's/^/- /' || true)
          PERF=$(echo "$COMMITS" | grep "^perf" | sed 's/^/- /' || true)
          REFACTOR=$(echo "$COMMITS" | grep "^refactor" | sed 's/^/- /' || true)
          OTHER=$(echo "$COMMITS" | grep -v "^feat\|^fix\|^perf\|^refactor" | sed 's/^/- /' || true)

          BODY=""
          [ -n "$FEAT" ]     && BODY="${BODY}## Features\n${FEAT}\n\n"
          [ -n "$FIX" ]      && BODY="${BODY}## Bug Fixes\n${FIX}\n\n"
          [ -n "$PERF" ]     && BODY="${BODY}## Performance\n${PERF}\n\n"
          [ -n "$REFACTOR" ] && BODY="${BODY}## Refactoring\n${REFACTOR}\n\n"
          [ -n "$OTHER" ]    && BODY="${BODY}## Other Changes\n${OTHER}\n\n"

          # Write to file to avoid multiline issues with GITHUB_OUTPUT
          printf "%b" "$BODY" > /tmp/changelog.md

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          gh release create "$NEW_TAG" \
            --title "$NEW_TAG" \
            --notes-file /tmp/changelog.md
