name: Docker Build

on:
  push:
    branches:
      - "renovate/**"
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
  merge_group:
    branches: ["main"]
  workflow_call:
    inputs:
      base_ref:
        description: 'Base SHA for change detection (used when called via workflow_call)'
        type: string
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'merge_group' }}

jobs:
  detect-changes:
    name: Detect Docker Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Check for docker file changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          base: ${{ inputs.base_ref }}
          filters: |
            docker:
              - 'docker-compose.dev.yml'
              - 'docker/**'
              - 'front/Dockerfile'
              - 'back/Dockerfile'
              - '.github/workflows/docker-build.yml'

  build:
    name: Docker Development Compose Build
    needs: detect-changes
    if: needs.detect-changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build Development Docker Compose
        run: docker compose -f docker-compose.dev.yml build
